<svg width="100%" viewBox="0 0 680 200" xmlns="http://www.w3.org/2000/svg" style="font-family: sans-serif; background: white;">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Flux back-office -->
  <rect x="30" y="70" width="130" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="95" y="93" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">Flux back-office</text>
  <text x="95" y="111" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">CSV / XML / plat</text>

  <line x1="162" y1="98" x2="206" y2="98" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Perl -->
  <rect x="208" y="70" width="130" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="273" y="93" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#633806">Perl</text>
  <text x="273" y="111" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#854F0B">Parse + transforme</text>

  <line x1="340" y1="98" x2="384" y2="98" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- LaTeX -->
  <rect x="386" y="70" width="130" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="451" y="93" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#3C3489">LaTeX</text>
  <text x="451" y="111" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#534AB7">Génère le PDF</text>

  <line x1="518" y1="98" x2="562" y2="98" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- GED -->
  <rect x="564" y="70" width="90" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="609" y="93" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#712B13">GED</text>
  <text x="609" y="111" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#993C1D">Stockage</text>
